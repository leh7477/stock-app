name: Deploy to Oracle Cloud Instance

on:
  push:
    branches:
      - main  # main 브랜치에 push되면 자동 배포

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1단계: SSH 키 설정
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # 2단계: Oracle VM에 nginx 없으면 자동 설치
      - name: Install nginx (if not present)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.ORACLE_HOST }} \
            "which nginx || (sudo apt-get update -qq && sudo apt-get install -y nginx)"

      # 3단계: 프론트엔드 파일 Oracle VM에 복사
      - name: Deploy frontend files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --include="*.html" \
            --include="*.css" \
            --include="*.js" \
            --exclude="node_modules/" \
            --exclude=".git/" \
            --exclude="api/" \
            --exclude="scripts/" \
            --exclude=".github/" \
            ./ ubuntu@${{ secrets.ORACLE_HOST }}:/tmp/stock-deploy/

      # 4단계: 파일을 nginx 서빙 디렉토리로 이동 + nginx 리로드
      - name: Apply files and reload nginx
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.ORACLE_HOST }} << 'EOF'
            sudo mkdir -p /var/www/stock-app
            sudo cp -r /tmp/stock-deploy/* /var/www/stock-app/
            sudo chown -R www-data:www-data /var/www/stock-app

            # nginx 설정 (처음 한 번만 적용)
            if [ ! -f /etc/nginx/sites-enabled/stock-app ]; then
              sudo tee /etc/nginx/sites-available/stock-app > /dev/null << 'NGINX'
          server {
              listen 80;
              server_name _;
              root /var/www/stock-app;
              index index.html;

              # API 요청은 Vercel로 프록시
              location /api/ {
                  proxy_pass https://stock-app-cyan-six.vercel.app/api/;
                  proxy_set_header Host stock-app-cyan-six.vercel.app;
              }

              location / {
                  try_files $uri $uri/ /index.html;
              }
          }
          NGINX
              sudo ln -sf /etc/nginx/sites-available/stock-app /etc/nginx/sites-enabled/
              sudo rm -f /etc/nginx/sites-enabled/default
            fi

            sudo nginx -t && sudo systemctl reload nginx
            echo "배포 완료!"
          EOF

      # 5단계: 배포 결과 확인
      - name: Verify deployment
        run: |
          echo "배포된 URL: http://${{ secrets.ORACLE_HOST }}"
          curl -s -o /dev/null -w "HTTP 상태코드: %{http_code}\n" http://${{ secrets.ORACLE_HOST }} || echo "VM 방화벽 설정 필요 (포트 80 열기)"
