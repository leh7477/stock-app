name: DART EPS 업데이트 (분기 1회)

on:
  schedule:
    # 분기 보고서 제출 기한 이후 실행 (KST 10:00 = UTC 01:00)
    # Q1(11013): 5월 15일 제출 → 5월 16일 실행
    # 반기(11012): 8월 14일 제출 → 8월 15일 실행
    # Q3(11014): 11월 14일 제출 → 11월 15일 실행
    - cron: '0 1 16 5 *'    # 5월 16일 (Q1)
    - cron: '0 1 15 8 *'    # 8월 15일 (반기)
    - cron: '0 1 15 11 *'   # 11월 15일 (Q3)
  workflow_dispatch:
    # 수동 실행 가능 (GitHub Actions 탭 → Run workflow)

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # DART API 전종목 조회: 최대 2시간

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 패키지 설치
        run: npm install

      - name: DART EPS 업데이트
        env:
          KV_REST_API_URL:   ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          DART_API_KEY:      ${{ secrets.DART_API_KEY }}
        run: node scripts/update-dart-eps.js

# ──────────────────────────────────────────────────────────────────
# 실행 주기: 연 3회 (5/8/11월 — 분기 보고서 제출 기한 다음날)
# 소요 시간: ~60~90분 (DART API 2500건 × 1.5초)
# 저장 키: dart_eps (TTL 95일)
# 사용처: api/analyze.js → PER = 현재가 ÷ dart_eps (실시간)
# ──────────────────────────────────────────────────────────────────
