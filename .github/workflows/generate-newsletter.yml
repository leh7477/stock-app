name: 국장 브리핑 생성 (매일 08:00 KST)

on:
  schedule:
    - cron: '0 23 * * 1-5'  # 평일 08:00 KST → 국장 브리핑
    - cron: '0 23 * * 6'    # 토요일 08:00 KST → 이번 주 마켓 리뷰
    - cron: '0 23 * * 0'    # 일요일 08:00 KST → 다음 주 전략
  workflow_dispatch:
    inputs:
      content_type:
        description: '콘텐츠 타입 (weekday / saturday / sunday)'
        required: false
        default: 'weekday'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 콘텐츠 타입 결정
        id: type
        run: |
          MANUAL="${{ github.event.inputs.content_type }}"
          SCHED="${{ github.event.schedule }}"
          if [ -n "$MANUAL" ]; then
            echo "content_type=$MANUAL" >> $GITHUB_OUTPUT
          elif [ "$SCHED" = "0 23 * * 6" ]; then
            echo "content_type=saturday" >> $GITHUB_OUTPUT
          elif [ "$SCHED" = "0 23 * * 0" ]; then
            echo "content_type=sunday" >> $GITHUB_OUTPUT
          else
            echo "content_type=weekday" >> $GITHUB_OUTPUT
          fi
          echo "결정된 타입: $(cat $GITHUB_OUTPUT | grep content_type)"

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 브리핑 생성
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          KV_REST_API_URL:   ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          CONTENT_TYPE:      ${{ steps.type.outputs.content_type }}
        run: python scripts/generate_newsletter.py

# ──────────────────────────────────────────────────────────────────
# 실행 주기:
#   평일(월~금) 08:00 KST → 당일 국장 브리핑
#   토요일     08:00 KST → 이번 주 마켓 리뷰
#   일요일     08:00 KST → 다음 주 전략
# 소요 시간: ~1~2분
# 저장 키:   daily_newsletter (TTL 26시간)
# ──────────────────────────────────────────────────────────────────
