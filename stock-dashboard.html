<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #141720;
    --bg3: #1c2030;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #6b7280;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.1);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.1);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── 앱 컨테이너 ── */
  .app { max-width: 430px; margin: 0 auto; padding-bottom: 72px; }

  /* ── 헤더 ── */
  .header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .header-left h1 { font-size: 18px; font-weight: 600; }
  .header-left p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .refresh-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: color 0.2s;
  }
  .refresh-btn:hover { color: var(--text); }
  .refresh-btn.spinning { animation: spin 0.8s linear; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 섹션 ── */
  .section { padding: 16px 16px 0; }
  .section-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── 시장 날씨 카드 ── */
  .weather-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .weather-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .weather-icon { font-size: 32px; }
  .weather-right { text-align: right; }
  .weather-score { font-size: 28px; font-weight: 600; }
  .weather-label { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .weather-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .weather-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .gauge { margin-top: 14px; }
  .gauge-bar { height: 4px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
  .gauge-labels { display: flex; justify-content: space-between; margin-top: 5px; font-size: 10px; color: var(--muted); }

  /* ── 거시 지표 ── */
  .macro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .macro-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
  }
  .macro-name { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .macro-val { font-size: 15px; font-weight: 600; }
  .macro-chg { font-size: 10px; margin-top: 3px; }
  .up { color: var(--red); }
  .down { color: var(--blue); }
  .flat { color: var(--muted); }
  .pos { color: var(--green); }

  /* ── AI 브리핑 ── */
  .briefing {
    background: var(--green-bg);
    border: 1px solid rgba(34,197,94,0.2);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .briefing-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .briefing-text { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.6; }

  /* ── 추천주 ── */
  .stock-list { display: flex; flex-direction: column; gap: 8px; }
  .stock-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .stock-card:hover { border-color: rgba(255,255,255,0.15); background: var(--bg3); }
  .stock-rank {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--muted);
    flex-shrink: 0;
  }
  .stock-info { flex: 1; }
  .stock-name { font-size: 14px; font-weight: 600; }
  .stock-reason { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stock-right { text-align: right; }
  .stock-price { font-size: 14px; font-weight: 600; }
  .stock-signal {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    margin-top: 3px;
  }
  .signal-buy { background: var(--green-bg); color: var(--green); }
  .signal-watch { background: var(--amber-bg); color: var(--amber); }
  .signal-caution { background: var(--red-bg); color: var(--red); }

  /* ── 뉴스 ── */
  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    cursor: pointer;
    transition: border-color 0.2s;
    text-decoration: none;
  }
  .news-card:hover { border-color: rgba(255,255,255,0.15); }
  .news-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .news-body { flex: 1; }
  .news-title { font-size: 13px; color: var(--text); line-height: 1.5; }
  .news-meta { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .news-tag {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 99px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ── 수급 분석 ── */
  .supply-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .supply-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }
  .supply-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .supply-val { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .supply-bar-wrap { height: 3px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .supply-bar { height: 100%; border-radius: 99px; transition: width 0.8s ease; }

  /* ── 하단 네비 ── */
  .nav {
    position: fixed; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 16px;
    z-index: 20;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px;
  }
  .nav-item .nav-icon { font-size: 20px; }
  .nav-item .nav-label { font-size: 10px; color: var(--muted); }
  .nav-item.active .nav-label { color: var(--green); }
  .nav-item.active .nav-icon { filter: drop-shadow(0 0 4px var(--green)); }

  /* ── 로딩 스켈레톤 ── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── 업데이트 시간 ── */
  .update-time { font-size: 10px; color: var(--muted); text-align: center; padding: 12px 0 4px; }

  /* ── 면책 고지 ── */
  .disclaimer {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 8px 20px 16px;
    line-height: 1.5;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="app">

  <!-- 오늘의 뉴스 -->

<!-- 하단 네비 -->
<div class="nav">
  <div class="nav-item active">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">홈</div>

<script>
// ─────────────────────────────────────────────
//  설정 (실제 앱에서는 여기에 API 키를 넣어요)
// ─────────────────────────────────────────────
const CONFIG = {
  // 나중에 실제 API 키로 교체
  NAVER_CLIENT_ID: 'YOUR_NAVER_CLIENT_ID',

// ─────────────────────────────────────────────
//  Mock 데이터 (API 연동 전까지 사용)
//  실제 API 연동 후 아래 함수들을 교체하세요
// ─────────────────────────────────────────────

    rate: { val: '3.50%', chg: '동결' },
    foreignNet: parseInt(foreignNet),
    instNet: parseInt(instNet),
    score: score,
  };
}

function getMockStocks() {
  return [
    { rank: 1, name: '삼성전자', reason: '외인 평단가 대비 3.8% 저평가', price: '74,200원', signal: 'buy', signalText: '매수 매력' },
    { rank: 2, name: 'SK하이닉스', reason: '수급 골든크로스 감지 (4일 연속)', price: '188,500원', signal: 'buy', signalText: '매수 매력' },
    { rank: 3, name: 'KB금융', reason: '금리 동결 수혜 + 기관 순매수', price: '92,100원', signal: 'watch', signalText: '관심 종목' },
    { rank: 4, name: 'LG에너지솔루션', reason: '단기 공매도 잔고 감소 중', price: '312,000원', signal: 'watch', signalText: '관심 종목' },
    { rank: 5, name: 'POSCO홀딩스', reason: '외인 대량 매도 → 반등 구간 주의', price: '421,500원', signal: 'caution', signalText: '주의' },

}

// ─────────────────────────────────────────────
//  네이버 RSS 뉴스 (CORS 프록시 없이 가능한 방법)
//  실제 앱에서는 서버리스 함수(Vercel)로 프록시 필요
// ─────────────────────────────────────────────

const MOCK_NEWS = [
  { title: '반도체 수출 5개월 연속 증가... 외인 매수세 견조', source: '매일경제', time: '1시간 전', sentiment: 'pos', url: 'https://www.mk.co.kr' },
  { title: '미 연준, 추가 금리 인하 신중론 부각... 달러 강세', source: '한국경제', time: '2시간 전', sentiment: 'neg', url: 'https://www.hankyung.com' },
  { title: '공매도 재개 한 달, 시장 충격 제한적 평가', source: '매일경제', time: '3시간 전', sentiment: 'neu', url: 'https://www.mk.co.kr' },
  { title: '코스피 외국인 4일 연속 순매수... 2700선 재도전', source: '한국경제', time: '4시간 전', sentiment: 'pos', url: 'https://www.hankyung.com' },
  { title: '원·달러 환율 1370원대... 수출주 실적 주목', source: '매일경제', time: '5시간 전', sentiment: 'neu', url: 'https://www.mk.co.kr' },
];

// ─────────────────────────────────────────────
//  시장 날씨 계산 (무료 로직)
//  외인 수급 + 코스피 변동 + 환율로 점수 계산
// ─────────────────────────────────────────────

function calcWeather(data) {
  let score = data.score;

  let icon, title, desc, color, gradient;

  if (score >= 70) {
    icon = '☀️';
    title = '대체로 맑음';
    desc = '외인 매수세 지속, 시장 에너지 높음. 공격적 포지션 고려해볼 만한 구간입니다.';
    color = 'var(--green)';
    gradient = 'linear-gradient(90deg, #15803d, #22c55e)';
  } else if (score >= 50) {
    icon = '🌤️';
    title = '맑고 약간 흐림';
    desc = '외인 매수세 있으나 변동성 주의. 분할 매수 전략이 유효한 시장입니다.';
    color = 'var(--amber)';
    gradient = 'linear-gradient(90deg, #d97706, #f59e0b)';
  } else if (score >= 35) {
    icon = '⛅';
    title = '흐리고 불안정';
    desc = '외인·기관 매매 혼조세. 섣부른 진입보다 관망이 유리한 구간입니다.';
    color = 'var(--amber)';
    gradient = 'linear-gradient(90deg, #92400e, #d97706)';
  } else {
    icon = '🌧️';
    title = '흐림 주의';
    desc = '외인 매도 우세, 방어적 포지션을 권장합니다. 현금 비중을 높이세요.';
    color = 'var(--red)';
    gradient = 'linear-gradient(90deg, #991b1b, #ef4444)';
  }

  return { score, icon, title, desc, color, gradient };
}

// ─────────────────────────────────────────────
//  자동 브리핑 생성 (규칙 기반 - AI 없이)
// ─────────────────────────────────────────────

function generateBriefing(data, weather) {
  const foreignDir = data.foreignNet > 0 ? '순매수' : '순매도';
  const foreignAmt = Math.abs(data.foreignNet).toLocaleString();
  const instDir = data.instNet > 0 ? '매수' : '매도';

  let msg = `외국인 ${foreignDir} ${foreignAmt}억 · 기관 ${instDir} 우세. `;

  if (data.foreignNet > 2000) {
    msg += '외인 대규모 매집 신호로 단기 상승 모멘텀 기대됩니다.';
  } else if (data.foreignNet > 0) {
    msg += '외인 소폭 유입, 방어적이나 긍정적 흐름입니다.';
  } else if (data.foreignNet < -2000) {
    msg += '외인 대규모 이탈 중. 환율 부담 확인 후 신중하게 접근하세요.';
  } else {
    msg += '외인·기관 방향성 불명확, 관망 후 진입 전략을 권장합니다.';
  }

  return msg;
}

// ─────────────────────────────────────────────
//  UI 렌더링 함수들
// ─────────────────────────────────────────────

function renderWeather(weather) {
  document.getElementById('weather-icon').textContent = weather.icon;
  document.getElementById('weather-title').textContent = weather.title;
  document.getElementById('weather-desc').textContent = weather.desc;
  const scoreEl = document.getElementById('weather-score');
  scoreEl.textContent = weather.score;
  scoreEl.style.color = weather.color;
  const fill = document.getElementById('gauge-fill');
  fill.style.width = weather.score + '%';
  fill.style.background = weather.gradient;
}

function renderMacro(data) {
  const kospiChg = parseFloat(data.kospi.chg);
  const usdChg = parseInt(data.usd.chg);
  document.getElementById('macro-grid').innerHTML = `
    <div class="macro-card">
      <div class="macro-name">기준금리</div>
      <div class="macro-val">${data.rate.val}</div>
      <div class="macro-chg flat">${data.rate.chg}</div>
    </div>
    <div class="macro-card">
      <div class="macro-name">원/달러</div>
      <div class="macro-val">${parseInt(data.usd.val).toLocaleString()}</div>
      <div class="macro-chg ${usdChg > 0 ? 'up' : 'down'}">${usdChg > 0 ? '▲' : '▼'} ${Math.abs(usdChg)}</div>
    </div>
    <div class="macro-card">
      <div class="macro-name">코스피</div>
      <div class="macro-val">${parseFloat(data.kospi.val).toLocaleString()}</div>
      <div class="macro-chg ${kospiChg > 0 ? 'up' : 'down'}">${kospiChg > 0 ? '▲' : '▼'} ${Math.abs(kospiChg)}</div>
    </div>
  `;
}

function renderSupply(data) {
  const fNet = data.foreignNet;
  const iNet = data.instNet;
  const fMax = 5000;
  const fPct = Math.min(Math.abs(fNet) / fMax * 100, 100);
  const iPct = Math.min(Math.abs(iNet) / fMax * 100, 100);
  const fColor = fNet > 0 ? 'var(--green)' : 'var(--red)';
  const iColor = iNet > 0 ? 'var(--green)' : 'var(--red)';

  document.getElementById('supply-grid').innerHTML = `
    <div class="supply-card">
      <div class="supply-label">외국인 순매수</div>
      <div class="supply-val ${fNet > 0 ? 'pos' : 'up'}">${fNet > 0 ? '+' : ''}${fNet.toLocaleString()}억</div>
      <div class="supply-bar-wrap"><div class="supply-bar" style="width:${fPct}%;background:${fColor}"></div></div>
    </div>
    <div class="supply-card">
      <div class="supply-label">기관 순매수</div>
      <div class="supply-val ${iNet > 0 ? 'pos' : 'up'}">${iNet > 0 ? '+' : ''}${iNet.toLocaleString()}억</div>
      <div class="supply-bar-wrap"><div class="supply-bar" style="width:${iPct}%;background:${iColor}"></div></div>
    </div>
  `;
}

function renderStocks(stocks) {
  document.getElementById('stock-list').innerHTML = stocks.map(s => `
    <div class="stock-card">
      <div class="stock-rank">${s.rank}</div>
      <div class="stock-info">
        <div class="stock-name">${s.name}</div>
        <div class="stock-reason">${s.reason}</div>
      </div>
      <div class="stock-right">
        <div class="stock-price">${s.price}</div>
        <span class="stock-signal signal-${s.signal}">${s.signalText}</span>
      </div>
    </div>
  `).join('');
}

function renderNews(news) {
  const dotColor = { pos: 'var(--green)', neg: 'var(--red)', neu: 'var(--muted)' };
  const tagStyle = {
    pos: 'background:var(--green-bg);color:var(--green)',
    neg: 'background:var(--red-bg);color:var(--red)',
    neu: 'background:var(--bg3);color:var(--muted)',
  };
  const tagText = { pos: '호재', neg: '악재', neu: '중립' };

  document.getElementById('news-list').innerHTML = news.map(n => `
    <a class="news-card" href="${n.url}" target="_blank" rel="noopener">
      <div class="news-dot" style="background:${dotColor[n.sentiment]}"></div>
      <div class="news-body">
        <div class="news-title">${n.title}</div>
        <div class="news-meta">
          ${n.source} · ${n.time}
          <span class="news-tag" style="${tagStyle[n.sentiment]}">${tagText[n.sentiment]}</span>
        </div>
      </div>
    </a>
  `).join('');
}

// ─────────────────────────────────────────────
//  메인 로드 함수
// ─────────────────────────────────────────────

async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  try {
    // 현재는 Mock 데이터 사용
    // TODO: 실제 API 연동 후 아래 함수들을 교체하세요
    //   - getMockMarketData() → fetchKISData()
    //   - MOCK_NEWS → fetchNaverNews()
    const data = getMockMarketData();
    const weather = calcWeather(data);
    const briefing = generateBriefing(data, weather);
    const stocks = getMockStocks();

    renderWeather(weather);
    renderMacro(data);
    renderSupply(data);
    renderStocks(stocks);
    renderNews(MOCK_NEWS);
    document.getElementById('briefing-text').textContent = briefing;

    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('last-update').textContent = `${timeStr} 업데이트`;
    document.getElementById('update-time').textContent = `마지막 업데이트: ${timeStr}`;

  } catch (e) {
    console.error(e);
    document.getElementById('briefing-text').textContent = '데이터를 불러오는 데 실패했습니다. 새로고침을 눌러주세요.';
  } finally {
    setTimeout(() => btn.classList.remove('spinning'), 500);
  }
}

// 앱 시작
loadAll();

// 5분마다 자동 갱신
setInterval(loadAll, 5 * 60 * 1000);
</script>
