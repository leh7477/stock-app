<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탐욕의 장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030;
    --border: rgba(255,255,255,0.07); --text: #e8eaf0; --muted: #6b7280;
    --green: #22c55e; --green-bg: rgba(34,197,94,0.1);
    --red: #ef4444; --red-bg: rgba(239,68,68,0.1);
    --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.1);
    --blue: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  .app { max-width: 430px; margin: 0 auto; padding-bottom: 72px; }
  .header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .header-left h1 { font-size: 18px; font-weight: 600; }
  .header-left p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .refresh-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: color 0.2s; }
  .refresh-btn.spinning { animation: spin 0.8s linear; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .section { padding: 16px 16px 0; }
  .section-title { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  
  /* 수급 카드 그리드 (3칸 정렬) */
  .supply-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .supply-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 8px; text-align: center; }
  .supply-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; white-space: nowrap; }
  .supply-val { font-size: 14px; font-weight: 600; }
  
  /* 거시 지표 그리드 */
  .macro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .macro-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; text-align: center; }
  .macro-name { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .macro-val { font-size: 15px; font-weight: 600; }
  .macro-chg { font-size: 10px; margin-top: 3px; }

  .up { color: var(--red); } .down { color: var(--blue); } .flat { color: var(--muted); }

  .weather-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
  .weather-top { display: flex; align-items: center; justify-content: space-between; }
  .weather-icon { font-size: 32px; }
  .weather-score { font-size: 28px; font-weight: 600; }
  
  .briefing { background: var(--green-bg); border: 1px solid rgba(34,197,94,0.2); border-radius: 12px; padding: 12px 14px; display: flex; gap: 10px; margin-bottom: 8px; }
  .briefing-text { font-size: 12px; line-height: 1.6; color: rgba(255,255,255,0.8); }

  .stock-list { display: flex; flex-direction: column; gap: 8px; }
  .stock-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex; align-items: center; justify-content: space-between; }

  .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg); border-top: 1px solid var(--border); display: flex; padding: 10px 0 16px; z-index: 20; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .nav-label { font-size: 10px; color: var(--muted); }

  .skeleton { background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; height: 20px; }
  @keyframes shimmer { to { background-position: -200% 0; } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>탐욕의 장 📈</h1>
      <p id="last-update">데이터 확인 중...</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↻</button>
  </div>

  <div class="section">
    <div class="section-title">시장 날씨</div>
    <div class="weather-card">
      <div class="weather-top">
        <div>
          <div class="weather-icon" id="weather-icon">⏳</div>
          <div class="weather-title" id="weather-title" style="font-size:15px; font-weight:600; margin-top:5px;">불러오는 중...</div>
        </div>
        <div style="text-align:right">
          <div class="weather-score" id="weather-score">--</div>
          <div style="font-size:10px; color:var(--muted)">시장 점수</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="briefing">
      <div class="briefing-text" id="briefing-text">AI가 수급 데이터를 분석하고 있습니다.</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">거시 지표</div>
    <div class="macro-grid" id="macro-grid">
      <div class="macro-card"><div class="macro-name">기준금리</div><div class="skeleton"></div></div>
      <div class="macro-card"><div class="macro-name">원/달러</div><div class="skeleton"></div></div>
      <div class="macro-card"><div class="macro-name">코스피</div><div class="skeleton"></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">개인·외인·기관 수급</div>
    <div class="supply-grid">
      <div class="supply-card">
        <div class="supply-label">개인 순매수</div>
        <div class="supply-val" id="personalNet">---</div>
      </div>
      <div class="supply-card">
        <div class="supply-label">외국인 순매수</div>
        <div class="supply-val" id="foreignNet">---</div>
      </div>
      <div class="supply-card">
        <div class="supply-label">기관 순매수</div>
        <div class="supply-val" id="instNet">---</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">거래량 상위</div>
    <div class="stock-list" id="stock-list">
      <div class="skeleton" style="height:60px; margin-bottom:8px;"></div>
      <div class="skeleton" style="height:60px;"></div>
    </div>
  </div>
</div>

<div class="nav">
  <div class="nav-item"><div style="font-size:20px">🏠</div><div class="nav-label">홈</div></div>
  <div class="nav-item"><div style="font-size:20px">📊</div><div class="nav-label">추천</div></div>
  <div class="nav-item"><div style="font-size:20px">🌍</div><div class="nav-label">수급</div></div>
  <div class="nav-item"><div style="font-size:20px">⚙️</div><div class="nav-label">설정</div></div>
</div>

<script>
async function fetchData(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) return { success: false, msg: 'HTTP_ERROR' };
    return await res.json();
  } catch (e) {
    return { success: false, msg: 'FETCH_ERROR' };
  }
}

function renderSupply(data) {
  const pEl = document.getElementById('personalNet');
  const fEl = document.getElementById('foreignNet');
  const iEl = document.getElementById('instNet');

  if (!data || !data.success) {
    pEl.innerText = "Error"; fEl.innerText = "Error"; iEl.innerText = "Error";
    return;
  }

  const p = data.personalNet;
  const f = data.foreignNet;
  const i = data.instNet;

  // 0원 땜질 방지: null이면 '대기', 있으면 숫자
  pEl.innerText = (p !== null) ? (p > 0 ? '+' : '') + p.toLocaleString() + "억" : "대기";
  fEl.innerText = (f !== null) ? (f > 0 ? '+' : '') + f.toLocaleString() + "억" : "대기";
  iEl.innerText = (i !== null) ? (i > 0 ? '+' : '') + i.toLocaleString() + "억" : "대기";

  if (p !== null) pEl.className = p >= 0 ? 'supply-val up' : 'supply-val down';
  if (f !== null) fEl.className = f >= 0 ? 'supply-val up' : 'supply-val down';
  if (i !== null) iEl.className = i >= 0 ? 'supply-val up' : 'supply-val down';
}

function renderMacro(data) {
  if (!data.success) return;
  document.getElementById('macro-grid').innerHTML = `
    <div class="macro-card"><div class="macro-name">기준금리</div><div class="macro-val">${data.rate || '3.50%'}</div><div class="macro-chg flat">동결</div></div>
    <div class="macro-card"><div class="macro-name">원/달러</div><div class="macro-val">${data.usd.val}</div><div class="macro-chg ${data.usd.chg > 0 ? 'up' : 'down'}">${data.usd.chg}%</div></div>
    <div class="macro-card"><div class="macro-name">코스피</div><div class="macro-val">${data.kospi.val}</div><div class="macro-chg ${data.kospi.chg > 0 ? 'up' : 'down'}">${data.kospi.chg}%</div></div>
  `;
}

async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  const [market, supply, stocks] = await Promise.all([
    fetchData('/api/market'),
    fetchData('/api/supply'),
    fetchData('/api/stocks')
  ]);

  if (supply) renderSupply(supply);
  if (market) renderMacro(market);
  
  if (stocks.success) {
    document.getElementById('stock-list').innerHTML = stocks.stocks.map(s => `
      <div class="stock-card">
        <div><div style="font-weight:600">${s.name}</div><div style="font-size:11px; color:var(--muted)">${s.sector}</div></div>
        <div style="text-align:right"><div style="font-weight:600">${s.price}</div><div class="${s.trend === 'up' ? 'up' : 'down'}" style="font-size:11px">${s.change}</div></div>
      </div>
    `).join('');
  }

  const now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('last-update').innerText = now + " 기준 탐욕 지수";
  btn.classList.remove('spinning');
}

loadAll();
setInterval(loadAll, 65000);
</script>
</body>
</html>
