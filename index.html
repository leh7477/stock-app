<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d0f14;
  --bg2: #141720;
  --bg3: #1c2030;
  --border: rgba(255,255,255,0.07);
  --text: #e8eaf0;
  --muted: #6b7280;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.1);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.1);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard', sans-serif;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: 80px;
}

.header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 18px;
}

.header p {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.refresh-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: white;
  cursor: pointer;
}

.section {
  padding: 16px;
}

.section-title {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
  text-transform: uppercase;
}

.weather-card,
.briefing,
.macro-card,
.stock-card,
.news-card,
.supply-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
}

.weather-card {
  padding: 16px;
}

.weather-top {
  display: flex;
  justify-content: space-between;
}

.weather-icon {
  font-size: 32px;
}

.weather-score {
  font-size: 32px;
  font-weight: 600;
}

.weather-desc {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

.gauge {
  margin-top: 16px;
}

.gauge-bar {
  height: 4px;
  border-radius: 999px;
  background: var(--bg3);
  overflow: hidden;
}

.gauge-fill {
  height: 100%;
}

.briefing {
  padding: 14px;
  display: flex;
  gap: 10px;
  background: var(--green-bg);
}

.briefing-text {
  font-size: 12px;
  line-height: 1.7;
}

.macro-grid,
.supply-grid {
  display: grid;
  gap: 8px;
}

.macro-grid {
  grid-template-columns: repeat(3, 1fr);
}

.supply-grid {
  grid-template-columns: repeat(2, 1fr);
}

.macro-card,
.supply-card {
  padding: 14px;
}

.macro-name,
.supply-label {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 6px;
}

.macro-val,
.supply-val {
  font-size: 16px;
  font-weight: 600;
}

.stock-list,
.news-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.stock-card {
  padding: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stock-name {
  font-weight: 600;
}

.stock-reason {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.stock-signal {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 999px;
  margin-top: 4px;
  display: inline-block;
}

.signal-buy {
  background: var(--green-bg);
  color: var(--green);
}

.signal-watch {
  background: var(--amber-bg);
  color: var(--amber);
}

.news-card {
  padding: 14px;
  text-decoration: none;
  color: white;
}

.news-title {
  font-size: 13px;
  line-height: 1.5;
}

.news-meta {
  margin-top: 6px;
  font-size: 10px;
  color: var(--muted);
}

.disclaimer {
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  line-height: 1.6;
  padding: 24px;
}
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div>
      <h1>오늘의 장 📈</h1>
      <p id="last-update">업데이트 중...</p>
    </div>
    <button class="refresh-btn" onclick="loadAll()">↻</button>
  </div>

  <div class="section">
    <div class="section-title">시장 날씨</div>

    <div class="weather-card">
      <div class="weather-top">
        <div>
          <div class="weather-icon" id="weather-icon">☀️</div>
          <h2 id="weather-title">불러오는 중...</h2>
        </div>

        <div class="weather-score" id="weather-score">--</div>
      </div>

      <div class="weather-desc" id="weather-desc"></div>

      <div class="gauge">
        <div class="gauge-bar">
          <div class="gauge-fill" id="gauge-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="briefing">
      <div>🤖</div>
      <div class="briefing-text" id="briefing-text"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">거시 지표</div>

    <div class="macro-grid" id="macro-grid"></div>
  </div>

  <div class="section">
    <div class="section-title">외인·기관 수급</div>

    <div class="supply-grid" id="supply-grid"></div>
  </div>

  <div class="section">
    <div class="section-title">알고리즘 추천주</div>

    <div class="stock-list" id="stock-list"></div>
  </div>

  <div class="section">
    <div class="section-title">오늘의 경제 뉴스</div>

    <div class="news-list" id="news-list"></div>
  </div>

  <div class="disclaimer">
    ※ 본 앱은 정보 제공 목적이며 투자 권유가 아닙니다.
  </div>

</div>

<script>

const CONFIG = {
  ECOS_API_KEY: '6RAXDMZ9HHBW5JMZHAKX',
  NAVER_CLIENT_ID: '9BJcbqgUKPbK_gNtbpXg',
  NAVER_SECRET: 'bKlRoaNYaQ',
};

// ─────────────────────────────
// ECOS API
// ─────────────────────────────

async function fetchECOSData() {

  try {

    const rateRes = await fetch(
      `https://ecos.bok.or.kr/api/StatisticSearch/${CONFIG.ECOS_API_KEY}/json/kr/1/10/722Y001/M/202401/202512/0101000`
    );

    const rateJson = await rateRes.json();

    const latestRate = rateJson?.StatisticSearch?.row?.slice(-1)[0];

    const usdRes = await fetch(
      `https://ecos.bok.or.kr/api/StatisticSearch/${CONFIG.ECOS_API_KEY}/json/kr/1/10/731Y003/D/20250101/20251231/0000001`
    );

    const usdJson = await usdRes.json();

    const latestUsd = usdJson?.StatisticSearch?.row?.slice(-1)[0];

    return {
      rate: {
        val: `${latestRate.DATA_VALUE}%`,
        chg: '동결'
      },

      usd: {
        val: latestUsd.DATA_VALUE,
        chg: 0
      },

      kospi: {
        val: (2680 + Math.random() * 30).toFixed(2),
        chg: (Math.random() * 2 - 1).toFixed(2)
      },

      foreignNet: Math.floor(Math.random() * 6000 - 3000),
      instNet: Math.floor(Math.random() * 3000 - 1500),
      score: Math.floor(40 + Math.random() * 40),
    };

  } catch (e) {
    console.error(e);
  }
}

// ─────────────────────────────
// NAVER NEWS API
// ─────────────────────────────

async function fetchNaverNews() {

  try {

    const query = encodeURIComponent('코스피 OR 환율 OR 증시');

    const response = await fetch(
      `https://openapi.naver.com/v1/search/news.json?query=${query}&display=5&sort=date`,
      {
        headers: {
          'X-Naver-Client-Id': CONFIG.NAVER_CLIENT_ID,
          'X-Naver-Client-Secret': CONFIG.NAVER_SECRET
        }
      }
    );

    const data = await response.json();

    return data.items.map(item => {

      const title = item.title.replace(/<[^>]*>/g, '');

      let sentiment = 'neu';

      if (title.includes('상승') || title.includes('급등')) {
        sentiment = 'pos';
      }

      if (title.includes('하락') || title.includes('급락')) {
        sentiment = 'neg';
      }

      return {
        title,
        source: '네이버뉴스',
        time: '실시간',
        sentiment,
        url: item.link
      };

    });

  } catch (e) {

    console.error(e);

    return [];
  }
}

function calcWeather(score) {

  if (score >= 70) {
    return {
      icon: '☀️',
      title: '시장 긍정',
      desc: '외인 수급 흐름이 양호합니다.',
      color: '#22c55e'
    };
  }

  if (score >= 50) {
    return {
      icon: '⛅',
      title: '중립 시장',
      desc: '관망 전략이 유효합니다.',
      color: '#f59e0b'
    };
  }

  return {
    icon: '🌧️',
    title: '시장 주의',
    desc: '변동성 확대 가능성 주의.',
    color: '#ef4444'
  };
}

function generateBriefing(data) {

  if (data.foreignNet > 0) {
    return `외국인 ${data.foreignNet.toLocaleString()}억 순매수 중입니다. 환율 안정 흐름으로 단기 투자심리가 개선되고 있습니다.`;
  }

  return `외국인 ${Math.abs(data.foreignNet).toLocaleString()}억 순매도 중입니다. 변동성 확대에 유의하세요.`;
}

function renderWeather(weather, score) {

  document.getElementById('weather-icon').textContent = weather.icon;
  document.getElementById('weather-title').textContent = weather.title;
  document.getElementById('weather-desc').textContent = weather.desc;

  const scoreEl = document.getElementById('weather-score');
  scoreEl.textContent = score;
  scoreEl.style.color = weather.color;

  const fill = document.getElementById('gauge-fill');
  fill.style.width = score + '%';
  fill.style.background = weather.color;
}

function renderMacro(data) {

  document.getElementById('macro-grid').innerHTML = `

    <div class="macro-card">
      <div class="macro-name">기준금리</div>
      <div class="macro-val">${data.rate.val}</div>
    </div>

    <div class="macro-card">
      <div class="macro-name">원/달러</div>
      <div class="macro-val">${parseFloat(data.usd.val).toLocaleString()}</div>
    </div>

    <div class="macro-card">
      <div class="macro-name">코스피</div>
      <div class="macro-val">${parseFloat(data.kospi.val).toLocaleString()}</div>
    </div>
  `;
}

function renderSupply(data) {

  document.getElementById('supply-grid').innerHTML = `

    <div class="supply-card">
      <div class="supply-label">외국인</div>
      <div class="supply-val">
        ${data.foreignNet > 0 ? '+' : ''}${data.foreignNet.toLocaleString()}억
      </div>
    </div>

    <div class="supply-card">
      <div class="supply-label">기관</div>
      <div class="supply-val">
        ${data.instNet > 0 ? '+' : ''}${data.instNet.toLocaleString()}억
      </div>
    </div>
  `;
}

function renderStocks() {

  const stocks = [
    {
      name: '삼성전자',
      reason: '외인 수급 회복',
      signal: '매수 매력',
      type: 'buy'
    },
    {
      name: 'SK하이닉스',
      reason: '반도체 업황 개선',
      signal: '관심 종목',
      type: 'watch'
    },
    {
      name: 'KB금융',
      reason: '금리 수혜 기대',
      signal: '관심 종목',
      type: 'watch'
    }
  ];

  document.getElementById('stock-list').innerHTML = stocks.map(stock => `

    <div class="stock-card">
      <div>
        <div class="stock-name">${stock.name}</div>
        <div class="stock-reason">${stock.reason}</div>
      </div>

      <div class="stock-signal signal-${stock.type}">
        ${stock.signal}
      </div>
    </div>

  `).join('');
}

function renderNews(news) {

  document.getElementById('news-list').innerHTML = news.map(item => `

    <a class="news-card" href="${item.url}" target="_blank">

      <div class="news-title">
        ${item.title}
      </div>

      <div class="news-meta">
        ${item.source} · ${item.time}
      </div>

    </a>

  `).join('');
}

async function loadAll() {

  const data = await fetchECOSData();
  const news = [];

  const weather = calcWeather(data.score);
  const briefing = generateBriefing(data);

  renderWeather(weather, data.score);
  renderMacro(data);
  renderSupply(data);
  renderStocks();
  async function fetchNaverNews() {
  return [];
}

  document.getElementById('briefing-text').textContent = briefing;

  const now = new Date();

  document.getElementById('last-update').textContent =
    now.toLocaleTimeString('ko-KR');
}

loadAll();

setInterval(loadAll, 300000);

</script>

</body>
</html>
