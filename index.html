<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #141720;
    --bg3: #1c2030;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #6b7280;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.1);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.1);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  .app { max-width: 430px; margin: 0 auto; padding-bottom: 72px; }
  .header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .header-left h1 { font-size: 18px; font-weight: 600; }
  .header-left p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .refresh-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: color 0.2s; }
  .refresh-btn:hover { color: var(--text); }
  .refresh-btn.spinning { animation: spin 0.8s linear; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .section { padding: 16px 16px 0; }
  .section-title { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .weather-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
  .weather-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .weather-icon { font-size: 32px; }
  .weather-right { text-align: right; }
  .weather-score { font-size: 28px; font-weight: 600; }
  .weather-label { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .weather-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .weather-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .gauge { margin-top: 14px; }
  .gauge-bar { height: 4px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
  .gauge-labels { display: flex; justify-content: space-between; margin-top: 5px; font-size: 10px; color: var(--muted); }
  .macro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .macro-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; }
  .macro-name { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .macro-val { font-size: 15px; font-weight: 600; }
  .macro-chg { font-size: 10px; margin-top: 3px; }
  .up { color: var(--red); }
  .down { color: var(--blue); }
  .flat { color: var(--muted); }
  .pos { color: var(--green); }
  .briefing { background: var(--green-bg); border: 1px solid rgba(34,197,94,0.2); border-radius: 12px; padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
  .briefing-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .briefing-text { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.6; }
  .stock-list { display: flex; flex-direction: column; gap: 8px; }
  .stock-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex; align-items: center; gap: 12px; transition: border-color 0.2s, background 0.2s; }
  .stock-card:hover { border-color: rgba(255,255,255,0.15); background: var(--bg3); }
  .stock-rank { width: 24px; height: 24px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--muted); flex-shrink: 0; }
  .stock-info { flex: 1; }
  .stock-name { font-size: 14px; font-weight: 600; }
  .stock-reason { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stock-right { text-align: right; }
  .stock-price { font-size: 14px; font-weight: 600; }
  .stock-signal { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; margin-top: 3px; }
  .signal-buy { background: var(--green-bg); color: var(--green); }
  .signal-watch { background: var(--amber-bg); color: var(--amber); }
  .signal-caution { background: var(--red-bg); color: var(--red); }
  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; cursor: pointer; transition: border-color 0.2s; text-decoration: none; }
  .news-card:hover { border-color: rgba(255,255,255,0.15); }
  .news-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .news-body { flex: 1; }
  .news-title { font-size: 13px; color: var(--text); line-height: 1.5; }
  .news-meta { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .news-tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 99px; margin-left: 4px; vertical-align: middle; }
  .supply-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .supply-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .supply-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .supply-val { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .supply-bar-wrap { height: 3px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .supply-bar { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
  .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg); border-top: 1px solid var(--border); display: flex; padding: 10px 0 16px; z-index: 20; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px; }
  .nav-item .nav-icon { font-size: 20px; }
  .nav-item .nav-label { font-size: 10px; color: var(--muted); }
  .nav-item.active .nav-label { color: var(--green); }
  .skeleton { background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .update-time { font-size: 10px; color: var(--muted); text-align: center; padding: 12px 0 4px; }
  .disclaimer { font-size: 10px; color: var(--muted); text-align: center; padding: 8px 20px 16px; line-height: 1.5; border-top: 1px solid var(--border); margin-top: 12px; }
  .error-badge { background: var(--red-bg); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 8px 12px; font-size: 11px; color: var(--red); margin-bottom: 8px; }
</style>
</head>
<body>

  <div class="header">

<script>
// ── API 키 설정 ──────────────────────────────
const ECOS_KEY = '6RAXDMZ9HHBW5JMZHAKX';
const NAVER_CLIENT_ID = '9BJcbqgUKPbK_gNtbpXg';
const NAVER_CLIENT_SECRET = 'bKlRoaNYaQ';
// KIS API는 집에서 받은 후 여기에 추가
// const KIS_APP_KEY = 'YOUR_KIS_APP_KEY';
// const KIS_APP_SECRET = 'YOUR_KIS_APP_SECRET';

// ── ECOS API: 기준금리 ───────────────────────
async function fetchBaseRate() {
  try {
    const url = `https://ecos.bok.or.kr/api/StatisticSearch/${ECOS_KEY}/json/kr/1/1/722Y001/DD/20240101/20991231/0101000`;
    const res = await fetch(url);
    const data = await res.json();
    const rows = data?.StatisticSearch?.row;
    if (rows && rows.length > 0) {
      return parseFloat(rows[rows.length - 1].DATA_VALUE).toFixed(2) + '%';
    }
  } catch (e) { console.error('기준금리 오류:', e); }
  return '3.50%';
}

// ── ECOS API: 원/달러 환율 ──────────────────
async function fetchExchangeRate() {
  try {
    const today = new Date();
    const from = new Date(today);
    from.setDate(from.getDate() - 10);
    const fmt = d => d.toISOString().slice(0,10).replace(/-/g,'');
    const url = `https://ecos.bok.or.kr/api/StatisticSearch/${ECOS_KEY}/json/kr/1/5/731Y001/DD/${fmt(from)}/${fmt(today)}/0000001`;
    const res = await fetch(url);
    const data = await res.json();
    const rows = data?.StatisticSearch?.row;
    if (rows && rows.length > 0) {
      const latest = rows[rows.length - 1];
      const prev = rows.length > 1 ? rows[rows.length - 2] : latest;
      const val = parseFloat(latest.DATA_VALUE);
      const chg = (val - parseFloat(prev.DATA_VALUE)).toFixed(1);
      return { val: Math.round(val).toLocaleString(), chg };
    }
  } catch (e) { console.error('환율 오류:', e); }
  return { val: '1,375', chg: '0' };
}

// ── 코스피 (Yahoo Finance CORS 프록시) ──────
async function fetchKospi() {
  try {
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/%5EKS11?interval=1d&range=2d';
    const res = await fetch(url);
    const data = await res.json();
    const closes = data?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
    if (closes && closes.length >= 2) {
      const cur = closes[closes.length - 1];
      const prev = closes[closes.length - 2];
      const chg = (cur - prev).toFixed(2);
      return { val: cur.toFixed(2), chg };
    }
  } catch (e) { console.error('코스피 오류:', e); }
  return { val: '2,687.45', chg: '+12.30' };
}

// ── 네이버 뉴스 RSS (CORS 프록시 사용) ──────
async function fetchNaverNews() {
  try {
    const query = encodeURIComponent('주식 증권 코스피 외인');
    // CORS 프록시를 통해 네이버 뉴스 RSS 가져오기
    const rssUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://openapi.naver.com/v1/search/news.json?query=${query}&display=5&sort=date`)}`;
    const res = await fetch(rssUrl, {
      headers: {
        'X-Naver-Client-Id': NAVER_CLIENT_ID,
        'X-Naver-Client-Secret': NAVER_CLIENT_SECRET
      }
    });
    const wrapper = await res.json();
    const inner = JSON.parse(wrapper.contents);
    if (inner?.items) {
      return inner.items.map(item => ({
        title: item.title.replace(/<[^>]+>/g, '').replace(/&quot;/g, '"').replace(/&amp;/g, '&'),
        source: item.originallink?.includes('mk.co.kr') ? '매일경제' :
                item.originallink?.includes('hankyung') ? '한국경제' :
                item.originallink?.includes('chosun') ? '조선비즈' : '경제뉴스',
        time: formatTime(item.pubDate),
        sentiment: guessSentiment(item.title),
        url: item.originallink || item.link
      }));
    }
  } catch (e) { console.error('뉴스 오류:', e); }
  return null;
}

// ── 감성 분석 (키워드 기반) ─────────────────
function guessSentiment(title) {
  const pos = ['상승','급등','호재','매수','강세','반등','성장','증가','흑자','상향'];
  const neg = ['하락','급락','악재','매도','약세','우려','감소','적자','하향','위기'];
  if (pos.some(k => title.includes(k))) return 'pos';
  if (neg.some(k => title.includes(k))) return 'neg';
  return 'neu';
}

function formatTime(pubDate) {
  try {
    const d = new Date(pubDate);
    const diff = Math.floor((Date.now() - d) / 60000);
    if (diff < 60) return `${diff}분 전`;
    if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
    return `${Math.floor(diff/1440)}일 전`;
  } catch { return '방금 전'; }
}

// ── 시장 날씨 계산 ───────────────────────────
function calcWeather(usdChg, kospiChg) {
  let score = 50;
  score += kospiChg > 0 ? Math.min(kospiChg * 5, 20) : Math.max(kospiChg * 5, -20);
  score += usdChg < 0 ? 10 : usdChg > 5 ? -10 : 0;
  score = Math.max(10, Math.min(90, Math.round(score)));

  if (score >= 65) return { score, icon:'☀️', title:'대체로 맑음', desc:'시장 에너지 높음. 외인 매수세 우위, 공격적 포지션 고려 가능합니다.', color:'var(--green)', gradient:'linear-gradient(90deg,#15803d,#22c55e)' };
  if (score >= 50) return { score, icon:'🌤️', title:'맑고 약간 흐림', desc:'긍정적이나 변동성 주의. 분할 매수 전략이 유효합니다.', color:'var(--amber)', gradient:'linear-gradient(90deg,#d97706,#f59e0b)' };
  if (score >= 35) return { score, icon:'⛅', title:'흐리고 불안정', desc:'방향성 불명확. 섣부른 진입보다 관망이 유리합니다.', color:'var(--amber)', gradient:'linear-gradient(90deg,#92400e,#d97706)' };
  return { score, icon:'🌧️', title:'흐림 — 주의', desc:'하락 압력 우세. 현금 비중을 높이고 방어적 포지션을 권장합니다.', color:'var(--red)', gradient:'linear-gradient(90deg,#991b1b,#ef4444)' };
}

// ── Mock 수급 데이터 (KIS API 연동 전) ──────
function getMockSupply() {
  const f = Math.round((Math.random() * 6000 - 3000) / 100) * 100;
  const i = Math.round((Math.random() * 4000 - 2000) / 100) * 100;
  return { foreignNet: f, instNet: i };
}

function getMockStocks() {
  return [
    { rank:1, name:'삼성전자', reason:'외인 평단가 대비 저평가 구간', price:'74,200원', signal:'buy', signalText:'매수 매력' },
    { rank:2, name:'SK하이닉스', reason:'수급 골든크로스 감지', price:'188,500원', signal:'buy', signalText:'매수 매력' },
    { rank:3, name:'KB금융', reason:'금리 동결 수혜 + 기관 순매수', price:'92,100원', signal:'watch', signalText:'관심 종목' },
    { rank:4, name:'LG에너지솔루션', reason:'공매도 잔고 감소 중', price:'312,000원', signal:'watch', signalText:'관심 종목' },
    { rank:5, name:'POSCO홀딩스', reason:'외인 매도 → 반등 구간 주의', price:'421,500원', signal:'caution', signalText:'주의' },
  ];
}

// ── 렌더링 ───────────────────────────────────
function renderWeather(w) {
  document.getElementById('weather-icon').textContent = w.icon;
  document.getElementById('weather-title').textContent = w.title;
  document.getElementById('weather-desc').textContent = w.desc;
  const s = document.getElementById('weather-score');
  s.textContent = w.score; s.style.color = w.color;
  const f = document.getElementById('gauge-fill');
  f.style.width = w.score + '%'; f.style.background = w.gradient;
}

function renderMacro(rate, usd, kospi) {
  const usdChg = parseFloat(usd.chg);
  const kospiChg = parseFloat(kospi.chg);
  document.getElementById('macro-grid').innerHTML = `
    <div class="macro-card"><div class="macro-name">기준금리</div><div class="macro-val">${rate}</div><div class="macro-chg flat">동결</div></div>
    <div class="macro-card"><div class="macro-name">원/달러</div><div class="macro-val">${usd.val}</div><div class="macro-chg ${usdChg>0?'up':'down'}">${usdChg>0?'▲':'▼'} ${Math.abs(usdChg)}</div></div>
    <div class="macro-card"><div class="macro-name">코스피</div><div class="macro-val">${parseFloat(kospi.val).toLocaleString()}</div><div class="macro-chg ${kospiChg>0?'up':'down'}">${kospiChg>0?'▲':'▼'} ${Math.abs(kospiChg)}</div></div>
  `;
}

function renderSupply(supply) {
  const fNet = supply.foreignNet, iNet = supply.instNet;
  const pct = v => Math.min(Math.abs(v)/5000*100, 100);
  const col = v => v > 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('supply-grid').innerHTML = `
    <div class="supply-card"><div class="supply-label">외국인 순매수</div><div class="supply-val ${fNet>0?'pos':'up'}">${fNet>0?'+':''}${fNet.toLocaleString()}억</div><div class="supply-bar-wrap"><div class="supply-bar" style="width:${pct(fNet)}%;background:${col(fNet)}"></div></div></div>
    <div class="supply-card"><div class="supply-label">기관 순매수</div><div class="supply-val ${iNet>0?'pos':'up'}">${iNet>0?'+':''}${iNet.toLocaleString()}억</div><div class="supply-bar-wrap"><div class="supply-bar" style="width:${pct(iNet)}%;background:${col(iNet)}"></div></div></div>
  `;
}

function renderStocks(stocks) {
  document.getElementById('stock-list').innerHTML = stocks.map(s => `
    <div class="stock-card">
      <div class="stock-rank">${s.rank}</div>
      <div class="stock-info"><div class="stock-name">${s.name}</div><div class="stock-reason">${s.reason}</div></div>
      <div class="stock-right"><div class="stock-price">${s.price}</div><span class="stock-signal signal-${s.signal}">${s.signalText}</span></div>
    </div>`).join('');
}

function renderNews(news) {
  if (!news) {
    document.getElementById('news-error').style.display = 'block';
    document.getElementById('news-list').innerHTML = '';
    return;
  }
  document.getElementById('news-error').style.display = 'none';
  const dotColor = { pos:'var(--green)', neg:'var(--red)', neu:'var(--muted)' };
  const tagStyle = { pos:'background:var(--green-bg);color:var(--green)', neg:'background:var(--red-bg);color:var(--red)', neu:'background:var(--bg3);color:var(--muted)' };
  const tagText = { pos:'호재', neg:'악재', neu:'중립' };
  document.getElementById('news-list').innerHTML = news.map(n => `
    <a class="news-card" href="${n.url}" target="_blank" rel="noopener">
      <div class="news-dot" style="background:${dotColor[n.sentiment]}"></div>
      <div class="news-body">
        <div class="news-title">${n.title}</div>
        <div class="news-meta">${n.source} · ${n.time}<span class="news-tag" style="${tagStyle[n.sentiment]}">${tagText[n.sentiment]}</span></div>
      </div>
    </a>`).join('');
}

function generateBriefing(supply, usd, kospi) {
  const fDir = supply.foreignNet > 0 ? '순매수' : '순매도';
  const fAmt = Math.abs(supply.foreignNet).toLocaleString();
  const usdChg = parseFloat(usd.chg);
  let msg = `외국인 ${fDir} ${fAmt}억. `;
  if (usdChg > 5) msg += '환율 강세로 외인 이탈 압력 있음. 방어적 접근 권장.';
  else if (supply.foreignNet > 2000) msg += '대규모 외인 매집 신호. 단기 상승 모멘텀 기대.';
  else if (supply.foreignNet > 0) msg += '외인 소폭 유입, 긍정적 흐름 유지 중.';
  else msg += '외인 이탈 주의. 관망 후 저점 확인 후 진입 전략 권장.';
  return msg;
}

// ── 메인 로드 ────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    const [rate, usd, kospi, news] = await Promise.all([
      fetchBaseRate(),
      fetchExchangeRate(),
      fetchKospi(),
      fetchNaverNews()
    ]);
    const supply = getMockSupply();
    const usdChg = parseFloat(usd.chg);
    const kospiChg = parseFloat(kospi.chg);
    const weather = calcWeather(usdChg, kospiChg);
    const briefing = generateBriefing(supply, usd, kospi);

    renderWeather(weather);
    renderMacro(rate, usd, kospi);
    renderSupply(supply);
    renderStocks(getMockStocks());
    renderNews(news);
    document.getElementById('briefing-text').textContent = briefing;

    const now = new Date();
    const t = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('last-update').textContent = `${t} 업데이트`;
    document.getElementById('update-time').textContent = `마지막 업데이트: ${t}`;
  } catch(e) {
    console.error(e);
    document.getElementById('briefing-text').textContent = '일부 데이터를 불러오지 못했습니다. 새로고침을 눌러주세요.';
  } finally {
    setTimeout(() => btn.classList.remove('spinning'), 500);
  }
}

loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
